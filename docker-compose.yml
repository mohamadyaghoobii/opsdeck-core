services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opsdeck
      POSTGRES_USER: opsdeck
      POSTGRES_PASSWORD: opsdeck
    ports:
      - "5432:5432"
    volumes:
      - opsdeck_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsdeck -d opsdeck"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://opsdeck:opsdeck@db:5432/opsdeck
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  opsdeck_db:
