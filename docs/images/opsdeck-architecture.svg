<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, Arial, sans-serif">
  <rect width="1200" height="640" fill="#0a0e14"/>
  <text x="40" y="52" fill="#e6edf5" font-size="22" font-weight="700">OpsDeck architecture</text>
  <text x="40" y="76" fill="#8b97a8" font-size="13">Core control plane today, with analyzer modules connecting over the same API contracts.</text>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 z" fill="#3a475a"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="40" y="150" width="200" height="92" rx="12" fill="#111722" stroke="#1d2632"/>
  <text x="60" y="190" fill="#e6edf5" font-size="15" font-weight="600">Browser</text>
  <text x="60" y="214" fill="#8b97a8" font-size="12">Operators &amp; engineers</text>

  <!-- Web -->
  <rect x="320" y="150" width="220" height="92" rx="12" fill="#111722" stroke="#274a78"/>
  <text x="340" y="184" fill="#e6edf5" font-size="15" font-weight="600">Next.js web</text>
  <text x="340" y="206" fill="#8b97a8" font-size="12">Dashboard / control room</text>
  <text x="340" y="224" fill="#5d6877" font-size="11">apps/web</text>

  <!-- API -->
  <rect x="620" y="150" width="220" height="92" rx="12" fill="#111722" stroke="#274a78"/>
  <text x="640" y="184" fill="#e6edf5" font-size="15" font-weight="600">FastAPI control plane</text>
  <text x="640" y="206" fill="#8b97a8" font-size="12">overview · runs · findings</text>
  <text x="640" y="224" fill="#5d6877" font-size="11">apps/api</text>

  <!-- DB -->
  <rect x="940" y="150" width="220" height="92" rx="12" fill="#111722" stroke="#1d2632"/>
  <text x="960" y="184" fill="#e6edf5" font-size="15" font-weight="600">PostgreSQL</text>
  <text x="960" y="206" fill="#8b97a8" font-size="12">projects · modules · runs</text>
  <text x="960" y="224" fill="#5d6877" font-size="11">SQLite for quick start</text>

  <!-- arrows row 1 -->
  <line x1="240" y1="196" x2="316" y2="196" stroke="#3a475a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="196" x2="616" y2="196" stroke="#3a475a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="196" x2="936" y2="196" stroke="#3a475a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="188" fill="#5d6877" font-size="11">REST</text>

  <!-- Module registry -->
  <rect x="620" y="330" width="220" height="64" rx="12" fill="#11233f" stroke="#274a78"/>
  <text x="640" y="358" fill="#e6edf5" font-size="14" font-weight="600">Module registry</text>
  <text x="640" y="378" fill="#8b97a8" font-size="11.5">shared API contracts</text>
  <line x1="730" y1="242" x2="730" y2="326" stroke="#3a475a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Future modules -->
  <text x="40" y="470" fill="#5d6877" font-size="11.5" font-weight="700" letter-spacing="1.2">PLANNED ANALYZER MODULES (SEPARATE REPOSITORIES)</text>
  <g font-size="12.5">
    <rect x="40" y="488" width="210" height="58" rx="10" fill="#0c111a" stroke="#283242"/>
    <text x="58" y="514" fill="#e6edf5" font-weight="600">Kubernetes analyzer</text>
    <text x="58" y="532" fill="#8b97a8" font-size="11">workloads · RBAC · ingress</text>

    <rect x="266" y="488" width="210" height="58" rx="10" fill="#0c111a" stroke="#283242"/>
    <text x="284" y="514" fill="#e6edf5" font-weight="600">Container analyzer</text>
    <text x="284" y="532" fill="#8b97a8" font-size="11">Dockerfile · image hygiene</text>

    <rect x="492" y="488" width="210" height="58" rx="10" fill="#0c111a" stroke="#283242"/>
    <text x="510" y="514" fill="#e6edf5" font-weight="600">CI/CD auditor</text>
    <text x="510" y="532" fill="#8b97a8" font-size="11">pipelines · supply chain</text>

    <rect x="718" y="488" width="210" height="58" rx="10" fill="#0c111a" stroke="#283242"/>
    <text x="736" y="514" fill="#e6edf5" font-weight="600">IaC auditor</text>
    <text x="736" y="532" fill="#8b97a8" font-size="11">Terraform · cloud posture</text>

    <rect x="944" y="488" width="216" height="58" rx="10" fill="#0c111a" stroke="#283242"/>
    <text x="962" y="514" fill="#e6edf5" font-weight="600">Report generator</text>
    <text x="962" y="532" fill="#8b97a8" font-size="11">exec &amp; technical reports</text>
  </g>

  <line x1="730" y1="394" x2="730" y2="484" stroke="#3a475a" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="600" y1="362" x2="266" y2="488" stroke="#283242" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="860" y1="362" x2="1010" y2="488" stroke="#283242" stroke-width="1.2" stroke-dasharray="4 4"/>
</svg>
